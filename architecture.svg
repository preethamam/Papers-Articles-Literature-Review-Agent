  <!-- Nav items -->
  <rect x="60"  y="98" width="105" height="44" rx="6" fill="#2563eb" stroke="#3b82f6" stroke-width="1"/>
  <text x="112" y="116" text-anchor="middle" font-size="10" fill="#fff">Dashboard</text>
  <text x="112" y="130" text-anchor="middle" font-size="9" fill="#bfdbfe">Stats overview</text>

  <rect x="175" y="98" width="105" height="44" rx="6" fill="#2563eb" stroke="#3b82f6" stroke-width="1"/>
  <text x="227" y="116" text-anchor="middle" font-size="10" fill="#fff">Library</text>
  <text x="227" y="130" text-anchor="middle" font-size="9" fill="#bfdbfe">Browse papers</text>

  <rect x="290" y="98" width="105" height="44" rx="6" fill="#7c3aed" stroke="#8b5cf6" stroke-width="1"/>
  <text x="342" y="116" text-anchor="middle" font-size="10" fill="#fff">Query</text>
  <text x="342" y="130" text-anchor="middle" font-size="9" fill="#ddd6fe">RAG Q&amp;A · SSE</text>

  <rect x="405" y="98" width="120" height="44" rx="6" fill="#0891b2" stroke="#06b6d4" stroke-width="1"/>
  <text x="465" y="116" text-anchor="middle" font-size="10" fill="#fff">Abstracts</text>
  <text x="465" y="130" text-anchor="middle" font-size="9" fill="#a5f3fc">Per-paper · Synthesis</text>

  <rect x="535" y="98" width="105" height="44" rx="6" fill="#059669" stroke="#10b981" stroke-width="1"/>
  <text x="587" y="116" text-anchor="middle" font-size="10" fill="#fff">Analytics</text>
  <text x="587" y="130" text-anchor="middle" font-size="9" fill="#a7f3d0">Charts &amp; stats</text>

  <rect x="650" y="98" width="105" height="44" rx="6" fill="#d97706" stroke="#f59e0b" stroke-width="1"/>
  <text x="702" y="116" text-anchor="middle" font-size="10" fill="#fff">Ingest</text>
  <text x="702" y="130" text-anchor="middle" font-size="9" fill="#fde68a">ETL · SSE stream</text>

  <!-- Arrow: Browser → FastAPI -->

  <polygon points="445,193 450,203 455,193" fill="#475569"/>
  <text x="460" y="177" font-size="9" fill="#64748b">HTTP / SSE  (/api/*)</text>

  <!-- ── FASTAPI LAYER ── -->
  <rect x="40" y="205" width="820" height="160" rx="10" fill="#1e293b" stroke="#334155" stroke-width="1.5"/>
  <text x="60" y="226" font-size="11" fill="#94a3b8" font-weight="bold">FASTAPI  (serve.py · single process · port auto-selected)</text>


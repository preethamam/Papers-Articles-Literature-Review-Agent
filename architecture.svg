<?xml version="1.0" encoding="UTF-8"?>
<svg width="900" height="740" viewBox="0 0 900 740" xmlns="http://www.w3.org/2000/svg" font-family="'SF Mono', 'Fira Code', monospace">

  <!-- Background -->
  <rect width="900" height="740" rx="16" fill="#0f1117"/>

  <!-- Title -->
  <text x="450" y="40" text-anchor="middle" font-size="20" font-weight="bold" fill="#f8fafc" font-family="'SF Pro Display', sans-serif">Lit Review Agent v2 — Architecture</text>

  <!-- ── BROWSER LAYER ── -->
  <rect x="40" y="65" width="820" height="90" rx="10" fill="#1e293b" stroke="#334155" stroke-width="1.5"/>

  <rect x="60"  y="238" width="140" height="54" rx="6" fill="#1e3a5f" stroke="#2563eb" stroke-width="1"/>
  <text x="130" y="258" text-anchor="middle" font-size="10" fill="#93c5fd" font-weight="bold">GET /papers</text>
